<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PROJECT YEMONT CEO OS</title>
  <style>
    :root {
      --ink: #251d18;
      --muted: #74685f;
      --line: #ead3a4;
      --panel: #ffffff;
      --soft: #fff8df;
      --nav: #182d58;
      --nav2: #274a86;
      --brown: #2a1b16;
      --yellow: #f0c51f;
      --orange: #e46f29;
      --teal: #3a8f87;
      --blue: #2f5fa8;
      --amber: #c9861d;
      --red: #c65d35;
      --green-bg: #eaf6ee;
      --blue-bg: #edf4ff;
      --amber-bg: #fff4cf;
      --red-bg: #fff0e7;
      --shadow: 0 12px 28px rgba(42, 27, 22, 0.12);
      --font-ui: "Comic Sans MS", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      font-family: inherit;
    }

    html {
      font-family: var(--font-ui);
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #fff8e8;
      font-family: var(--font-ui);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      font-family: var(--font-ui);
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 36px;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 720;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      border-color: #d88a22;
      color: #241813;
    }

    button.subtle {
      background: #fff4c9;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 36px;
      padding: 8px 10px;
    }

    input[type="checkbox"]:not(.row-select) {
      width: 22px;
      height: 22px;
      min-width: 22px;
      min-height: 22px;
      padding: 0;
      accent-color: var(--teal);
    }

    textarea {
      resize: vertical;
      min-height: 74px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, #14294f 0%, #1d2f58 48%, #2a1b16 100%);
      color: #fff;
      padding: 22px 16px;
      overflow: auto;
    }

    .brand {
      padding: 0 8px 18px;
      border-bottom: 1px solid rgba(240, 197, 31, 0.28);
      margin-bottom: 14px;
    }

    .brand .eyebrow {
      font-size: 12px;
      color: #f0c51f;
      font-weight: 780;
      letter-spacing: 0.08em;
    }

    .brand h1 {
      margin: 7px 0 4px;
      font-size: 25px;
      line-height: 1.1;
      color: #fff7d8;
    }

    .brand p {
      margin: 0;
      color: #f5db9a;
      font-size: 13px;
      line-height: 1.45;
    }

    .navbtn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      border-color: transparent;
      color: #f7e6bd;
      margin: 3px 0;
      text-align: left;
    }

    .navbtn.dragging {
      opacity: 0.45;
    }

    .drag-handle {
      color: inherit;
      opacity: 0.55;
      margin-right: 6px;
    }

    .navbtn.active {
      background: linear-gradient(135deg, #f4ca2c, #ea7a2b);
      color: #241813;
    }

    .navbtn .count {
      color: inherit;
      opacity: 0.7;
      font-size: 12px;
    }

    .content {
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      background: rgba(255, 250, 236, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
    }

    .title h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .save-status {
      align-self: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 36px;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 720;
      cursor: pointer;
    }

    input[type="file"] {
      display: none;
    }

    main {
      padding: 22px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .metrics {
      grid-template-columns: repeat(5, minmax(150px, 1fr));
    }

    .two {
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
    }

    .three {
      grid-template-columns: repeat(3, minmax(220px, 1fr));
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card.pad {
      padding: 16px;
    }

    .metric {
      padding: 15px;
      min-height: 98px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .metric .value {
      margin-top: 8px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 820;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .metric .hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .section-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-btn {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .drag-cell {
      width: 42px;
      text-align: center;
      color: var(--muted);
      cursor: grab;
      font-size: 17px;
      font-weight: 900;
      user-select: none;
    }

    tr.dragging,
    .task-row.dragging,
    .check-group.dragging,
    .check-item.dragging {
      opacity: 0.45;
    }

    .row-select {
      width: 14px;
      height: 14px;
      min-width: 14px;
      min-height: 14px;
      padding: 0;
      margin: 0;
      accent-color: var(--nav);
    }

    .select-cell {
      width: 38px;
      text-align: center;
    }

    .toolbar input, .toolbar select {
      width: auto;
      min-width: 170px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 235px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 1600px;
      font-size: 13px;
    }

    .franchise-table {
      min-width: 5000px;
    }

    .franchise-table th:nth-child(1),
    .franchise-table td:nth-child(1) {
      min-width: 38px;
      width: 38px;
    }

    .franchise-table th:nth-child(2),
    .franchise-table td:nth-child(2) {
      min-width: 42px;
      width: 42px;
    }

    .franchise-table th:nth-child(4),
    .franchise-table td:nth-child(4) {
      min-width: 150px;
      width: 150px;
      max-width: 150px;
    }

    .franchise-table th:nth-child(5),
    .franchise-table td:nth-child(5) {
      min-width: 430px;
      width: 430px;
      max-width: 430px;
    }

    .franchise-table th:nth-child(6),
    .franchise-table td:nth-child(6) {
      min-width: 118px;
      width: 118px;
      max-width: 118px;
    }

    .franchise-table th:nth-child(3),
    .franchise-table td:nth-child(3) {
      min-width: 54px;
      width: 54px;
      max-width: 54px;
    }

    .branch-title {
      display: block;
      white-space: nowrap;
      font-weight: 820;
      line-height: 1.25;
      font-size: 13px;
    }

    .branch-sub {
      display: block;
      white-space: nowrap;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .address-text,
    .phone-text {
      display: block;
      white-space: nowrap;
      line-height: 1.3;
      font-size: 13px;
    }

    .address-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phone-text {
      letter-spacing: 0;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: middle;
      background: #fff;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: #fff0b8;
      color: #3a2a1f;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    td:first-child, th:first-child {
      position: sticky;
      left: 0;
      z-index: 5;
      background: #fff8df;
    }

    th:first-child {
      z-index: 7;
      background: #f4d35e;
    }

    td input, td select, td textarea {
      min-width: 96px;
      font-size: 13px;
    }

    td textarea {
      min-width: 300px;
      min-height: 54px;
      field-sizing: content;
      overflow: hidden;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    td input[type="text"],
    td input:not([type]),
    td input[type="url"] {
      min-width: 150px;
    }

    .auto-cell {
      width: var(--w, 150px);
      max-width: 520px;
    }

    .auto-textarea {
      width: var(--w, 300px);
      max-width: 620px;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.blue {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .pill.green {
      background: var(--green-bg);
      color: var(--teal);
    }

    .pill.amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .pill.red {
      background: var(--red-bg);
      color: var(--red);
    }

    .score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      height: 28px;
      border-radius: 999px;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
      background: var(--red-bg);
      color: var(--red);
    }

    .score.mid {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .score.high {
      background: var(--green-bg);
      color: var(--teal);
    }

    .stars {
      font-weight: 820;
      color: #b87912;
      white-space: nowrap;
    }

    .timeline {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .timeline-overview {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff6d7;
    }

    .donut {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--orange) calc(var(--p) * 1%), #f2dfb3 0);
      position: relative;
      font-weight: 820;
      color: var(--ink);
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: #fff;
    }

    .donut span {
      position: relative;
      z-index: 1;
    }

    .milestone {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr) 120px;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fffef8;
    }

    .task-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .mission-box {
      min-width: 360px;
      display: grid;
      gap: 8px;
    }

    .mission-head {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) 62px;
      gap: 8px;
      align-items: center;
    }

    .mission-row {
      display: grid;
      grid-template-columns: 26px minmax(240px, 1fr) 62px;
      gap: 8px;
      align-items: center;
    }

    .mission-row input[type="text"] {
      min-height: 32px;
      width: 100%;
    }

    .task-row {
      display: grid;
      grid-template-columns: 28px 34px minmax(520px, 1fr) 72px;
      gap: 8px;
      align-items: center;
    }

    .task-row input[type="text"] {
      min-height: 32px;
      width: 100%;
    }

    .checklist-section {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .check-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .check-group summary {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      font-weight: 820;
      background: #fff3c7;
    }

    .check-items {
      display: grid;
      gap: 8px;
      padding: 12px 14px 14px;
    }

    .group-memo {
      margin: 0 14px 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }

    .check-item {
      display: grid;
      grid-template-columns: 34px 26px minmax(220px, 0.9fr) minmax(260px, 1.1fr);
      gap: 8px;
      align-items: start;
      line-height: 1.45;
    }

    .check-note {
      min-height: 34px;
      font-size: 13px;
    }

    .check-item input {
      margin-top: 4px;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #f2dfb3;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--yellow), var(--orange));
    }

    .todo-list {
      display: grid;
      gap: 8px;
      padding: 16px;
    }

    .todo {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .recent-list {
      display: grid;
      gap: 8px;
      padding: 16px;
    }

    .recent-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .recent-item strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .memo-board {
      display: grid;
      grid-template-columns: minmax(360px, 1.15fr) minmax(320px, 0.85fr);
      gap: 14px;
    }

    .memo-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .memo-tools select {
      width: auto;
      min-width: 230px;
      max-width: 100%;
    }

    .memo-meta {
      display: grid;
      grid-template-columns: 160px minmax(220px, 1fr);
      gap: 10px;
      padding: 16px 16px 0;
    }

    .memo-meta label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .brain-dump {
      min-height: calc(100vh - 250px);
      width: 100%;
      line-height: 1.65;
      font-size: 15px;
      resize: vertical;
    }

    .recovery-list {
      display: grid;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .recovery-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fffef8;
      padding: 10px 12px;
    }

    .recovery-item strong {
      display: block;
      margin-bottom: 3px;
      line-height: 1.35;
    }

    .finance-visual {
      display: grid;
      grid-template-columns: minmax(300px, 0.95fr) minmax(360px, 1.05fr);
      gap: 14px;
      margin-top: 14px;
    }

    .calendar-card {
      margin-top: 14px;
    }

    .money-calendar {
      padding: 16px;
      overflow: auto;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(126px, 1fr));
      min-width: 920px;
    }

    .calendar-weekdays div {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      border-bottom: 1px solid var(--line);
      background: #fff6d7;
    }

    .calendar-day {
      min-height: 122px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      padding: 8px;
    }

    .calendar-day:nth-child(7n) {
      border-right: 0;
    }

    .calendar-day.other-month {
      background: #fffaf0;
      color: #b6a491;
    }

    .calendar-day.today {
      background: #fff1b7;
      box-shadow: inset 0 0 0 3px rgba(228, 111, 41, 0.35);
    }

    .calendar-date {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .calendar-event {
      display: block;
      width: 100%;
      border-radius: 6px;
      padding: 5px 7px;
      margin-top: 5px;
      color: #241813;
      background: #f4ca2c;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .calendar-event.contract {
      background: #f4ca2c;
    }

    .calendar-event.interior {
      background: #f09a3b;
    }

    .calendar-event.property {
      background: #9ed7cf;
    }

    .calendar-event.reserve {
      background: #d9c9f5;
    }

    .finance-calendar {
      display: grid;
      gap: 10px;
      padding: 16px;
      max-height: 430px;
      overflow: auto;
    }

    .finance-month {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffef8;
      padding: 12px;
    }

    .finance-month h4 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 8px;
      font-size: 14px;
    }

    .finance-month-row {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-top: 1px dashed var(--line);
      font-size: 13px;
    }

    .finance-timeline {
      display: grid;
      gap: 9px;
      padding: 16px;
      max-height: 430px;
      overflow: auto;
    }

    .finance-event {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffef8;
      padding: 11px 12px;
    }

    .finance-event strong {
      display: block;
      line-height: 1.35;
    }

    .finance-empty {
      padding: 16px;
      color: var(--muted);
      line-height: 1.55;
    }

    .summary-panel {
      display: grid;
      gap: 12px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffef8;
      padding: 12px;
    }

    .summary-box h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .summary-box ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.55;
    }

    .keyword-cloud {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .keyword-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--amber-bg);
      color: var(--brown);
      font-size: 12px;
      font-weight: 800;
    }

    .flow-diagram {
      display: grid;
      gap: 8px;
    }

    .flow-node {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      line-height: 1.45;
    }

    .flow-node:not(:last-child)::after {
      content: "↓";
      display: block;
      color: var(--orange);
      font-weight: 900;
      text-align: center;
      margin: 6px 0 -4px;

    }

    .todo-meta {

      font-size: 12px;
      font-weight: 760;
    }

    }

    .muted {

      font-size: 13px;
      line-height: 1.55;
      margin: 0;
    }

    .auth-screen {

      localStorage.setItem(storageKey, JSON.stringify(state));
      setSaveStatus(authSession ? `온라인 저장 준비 ${formatTime()}` : `이 기기에 저장됨 ${formatTime()}`);
      if (authSession) queueCloudSave(showAlert);
      else if (showAlert) alert("이 기기에 저장되었습니다. 온라인 저장은 로그인 후 가능합니다.");
      if (rerender) render();
    }

    function loadAuthSession() {
      try {
        return JSON.parse(localStorage.getItem(authStorageKey) || "null");
      } catch {
        return null;
      }
    }

    function storeAuthSession(session) {
      authSession = session;
      if (session) localStorage.setItem(authStorageKey, JSON.stringify(session));
      else localStorage.removeItem(authStorageKey);
      updateAuthUi();
    }

    function authHeaders(useUserToken = true) {
      const token = useUserToken && authSession?.access_token ? authSession.access_token : supabaseAnonKey;
      return {
        apikey: supabaseAnonKey,
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json"
      };
    }

    function normalizeSession(payload) {
      const expiresAt = payload.expires_at || Math.floor(Date.now() / 1000) + Number(payload.expires_in || 3600);
      return {
        access_token: payload.access_token,
        refresh_token: payload.refresh_token,
        expires_at: expiresAt,
        user: payload.user || authSession?.user || null
      };
    }

    async function ensureSession() {
      if (!authSession?.access_token) throw new Error("로그인이 필요합니다.");
      const now = Math.floor(Date.now() / 1000);
      if (authSession.expires_at && authSession.expires_at > now + 60) return authSession;
      if (!authSession.refresh_token) throw new Error("로그인이 만료되었습니다. 다시 로그인해 주세요.");
      const res = await fetch(`${supabaseProjectUrl}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: authHeaders(false),
        body: JSON.stringify({ refresh_token: authSession.refresh_token })
      });
      if (!res.ok) {
        storeAuthSession(null);
        throw new Error("로그인이 만료되었습니다. 다시 로그인해 주세요.");
      }
      const session = normalizeSession(await res.json());
      storeAuthSession(session);
      return session;
    }

    function updateAuthUi() {
      const authScreen = document.getElementById("authScreen");
      const cloudUser = document.getElementById("cloudUser");
      if (!authScreen || !cloudUser) return;
      authScreen.classList.toggle("active", !authSession);
      cloudUser.textContent = authSession?.user?.email ? `온라인: ${authSession.user.email}` : "로그인 필요";
    }

    function setAuthMessage(message, isError = true) {
      const el = document.getElementById("authMessage");
      if (!el) return;
      el.style.color = isError ? "var(--red)" : "var(--teal)";
      el.textContent = message;
    }

    async function signIn(email, password) {
      setAuthMessage("로그인 중입니다...", false);
      const res = await fetch(`${supabaseProjectUrl}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: authHeaders(false),
        body: JSON.stringify({ email, password })
      });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(payload.error_description || payload.msg || "로그인에 실패했습니다.");
      storeAuthSession(normalizeSession(payload));
      setAuthMessage("");
      await loadCloudState();
    }

    function signOut() {
      storeAuthSession(null);
      setSaveStatus("로그아웃됨. 로그인하면 온라인 데이터를 불러옵니다.");
    }

    function queueCloudSave(showAlert = false) {
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => {
        syncCloudState(showAlert);
      }, showAlert ? 0 : 650);
    }

    function cloudDataIsEmpty(data) {
      return !data || (typeof data === "object" && !Array.isArray(data) && Object.keys(data).length === 0);
    }

    async function loadCloudState() {
      if (!authSession || isCloudLoading) return;
      isCloudLoading = true;
      setSaveStatus("온라인 데이터 불러오는 중...");
      try {
        await ensureSession();
        const res = await fetch(`${supabaseRestUrl}/project_yemont_state?id=eq.${encodeURIComponent(cloudProjectId)}&select=data,updated_at`, {
          headers: authHeaders(true)
        });
        const payload = await res.json().catch(() => []);
        if (!res.ok) throw new Error(payload.message || "온라인 데이터를 불러오지 못했습니다.");
        const row = Array.isArray(payload) ? payload[0] : null;
        if (row && !cloudDataIsEmpty(row.data)) {
          state = mergeDeep(clone(defaults), row.data);
          normalizeState();
          localStorage.setItem(storageKey, JSON.stringify(state));
          setSaveStatus(`온라인 데이터 불러옴 ${formatTime()}`);
          render();
        } else {
          await syncCloudState(false);
          setSaveStatus(`첫 온라인 데이터 생성됨 ${formatTime()}`);
        }
      } catch (error) {
        setSaveStatus("온라인 연결 오류");
        alert(`Supabase 연결을 확인해 주세요.\n\n${error.message}`);
      } finally {
        isCloudLoading = false;
        updateAuthUi();
      }
    }

    async function syncCloudState(showAlert = false) {
      if (!authSession) return;
      try {
        await ensureSession();
        setSaveStatus("온라인 저장 중...");
        const res = await fetch(`${supabaseRestUrl}/project_yemont_state?on_conflict=id`, {
          method: "POST",
          headers: {
            ...authHeaders(true),
            Prefer: "resolution=merge-duplicates,return=minimal"
          },
          body: JSON.stringify([{ id: cloudProjectId, data: state, updated_at: new Date().toISOString() }])
        });
        if (!res.ok) {
          const payload = await res.json().catch(() => ({}));
          throw new Error(payload.message || "온라인 저장에 실패했습니다.");
        }
        setSaveStatus(`온라인 저장됨 ${formatTime()}`);
        if (showAlert) alert("온라인에 저장되었습니다.");
      } catch (error) {
        setSaveStatus("온라인 저장 오류");
        if (showAlert) alert(`온라인 저장을 확인해 주세요.\n\n${error.message}`);
      }
    }

    function snapshotForUndo() {
      undoStack.push(JSON.stringify(state));
      undoStack = undoStack.slice(-25);
    }

    function undoLast() {
      const previous = undoStack.pop();
      if (!previous) {
        alert("되돌릴 이전 상태가 없습니다.");
        return;
      }
      state = JSON.parse(previous);
      setSaveStatus(`되돌림 ${formatTime()}`);
      saveState(false);
    }

          <span><span class="drag-handle">⋮⋮</span>${label}</span><span class="count">${count}</span>
        </button>
      `).join("");
      document.querySelectorAll(".navbtn").forEach((btn) => btn.addEventListener("click", () => setView(btn.dataset.view)));
      document.querySelectorAll(".navbtn").forEach((btn) => {
        btn.addEventListener("dragstart", (event) => {
          btn.classList.add("dragging");
          event.dataTransfer.setData("text/plain", btn.dataset.view);
        });
        btn.addEventListener("dragend", () => btn.classList.remove("dragging"));
        btn.addEventListener("dragover", (event) => event.preventDefault());
        btn.addEventListener("drop", (event) => {
          event.preventDefault();
          const from = event.dataTransfer.getData("text/plain");
          const to = btn.dataset.view;
          moveNavItem(from, to);
        });
      });
    }

    function moveNavItem(from, to) {
      if (!from || !to || from === to) return;
      const order = getNavItems().map(([id]) => id);
      const fromIndex = order.indexOf(from);
      const toIndex = order.indexOf(to);
      if (fromIndex < 0 || toIndex < 0) return;
      order.splice(fromIndex, 1);
      order.splice(toIndex, 0, from);
      state.navOrder = order;
      saveState(false);
    }

    function simpleCell(collection, index, key, type = "text", options = null) {

      }
      if (type === "textarea") return `<textarea class="auto-textarea" style="--w:${inputWidth(value, 320, 620)}px" oninput="autoGrow(this)" onchange="editCell('${collection}',${index},'${key}',this.value)">${esc(value)}</textarea>`;
      return `<input class="auto-cell" style="--w:${inputWidth(value, type === "number" ? 110 : 160, type === "number" ? 180 : 520)}px" type="${type}" value="${esc(value)}" oninput="resizeInput(this)" onchange="editCell('${collection}',${index},'${key}',this.value)">`;
    }

    function inputWidth(value, min, max) {
      const text = String(value ?? "");
      const korean = (text.match(/[ㄱ-ㅎ가-힣]/g) || []).length;
      const other = Math.max(0, text.length - korean);
      const px = 34 + korean * 15 + other * 8;
      return Math.max(min, Math.min(max, px));
    }

    function resizeInput(el) {
      el.style.setProperty("--w", `${inputWidth(el.value, el.type === "number" ? 110 : 160, el.type === "number" ? 180 : 520)}px`);
    }

    function autoGrow(el) {
      el.style.height = "auto";
      el.style.height = `${Math.max(54, el.scrollHeight + 2)}px`;
      el.style.setProperty("--w", `${inputWidth(el.value, 320, 620)}px`);
    }

    function financeMonthlyGroups() {
      const groups = new Map();
      financeRowsWithDates().forEach((row) => {
        const month = String(row.due).slice(0, 7);
        if (!groups.has(month)) groups.set(month, []);
        groups.get(month).push(row);
      });
      return Array.from(groups.entries()).map(([month, rows]) => ({
        month,
        rows,
        total: rows.reduce((sum, row) => sum + num(row.amount), 0)
      }));
    }

    function addMonths(month, amount) {
      const [year, mon] = String(month || todayIso().slice(0, 7)).split("-").map(Number);
      const date = new Date(year, mon - 1 + amount, 1);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function activeFinanceMonth() {
      const savedMonth = state.settings.financeCalendarMonth;
      if (savedMonth) return savedMonth;
      const next = financeRowsWithDates().find((row) => row.status !== "완료") || financeRowsWithDates()[0];
      return next?.due ? String(next.due).slice(0, 7) : todayIso().slice(0, 7);

      if (category.includes("인테리어")) return "interior";

      return "contract";

    function analyzeMemoText(text) {
      const cleaned = String(text || "").trim();
      const lines = cleaned.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      const sentences = cleaned.split(/[.!?。！？\n]+/).map((line) => line.trim()).filter((line) => line.length >= 8);
      const candidates = (sentences.length ? sentences : lines).sort((a, b) => b.length - a.length).slice(0, 5);
      const stopwords = new Set(["그리고", "그래서", "하지만", "나는", "우리", "이것", "저것", "하면", "해서", "있는", "없는", "정도", "관련", "생각", "내용", "메모", "해야", "일단", "진짜", "너무", "같은", "위해"]);
      const words = cleaned.match(/[가-힣A-Za-z0-9]{2,}/g) || [];
      const counts = new Map();
      words.forEach((word) => {
        const normalized = word.toLowerCase();
        if (stopwords.has(normalized) || normalized.length < 2) return;
        counts.set(normalized, (counts.get(normalized) || 0) + 1);
      });
      const keywords = Array.from(counts.entries())
        .sort((a, b) => b[1] - a[1] || b[0].length - a[0].length)
        .slice(0, 10)
        .map(([word]) => word);
      const flow = lines.length ? lines.slice(0, 7) : candidates.slice(0, 7);
      return { lines, summary: candidates, keywords, flow };
    }

    function collectMemoCandidatesFromValue(value, source, bucket, seen, depth = 0) {
      if (depth > 8 || value == null) return;
      const sourceIsMemo = String(source).toLowerCase().includes("memo");
      if (Array.isArray(value)) {
        if (sourceIsMemo) value.forEach((item, index) => collectMemoCandidatesFromValue(item, `${source}[${index}]`, bucket, seen, depth + 1));
        return;
      }
      if (typeof value !== "object") return;
      if (value.freeMemo) collectMemoCandidatesFromValue(value.freeMemo, `${source}.freeMemo`, bucket, seen, depth + 1);
      if (Array.isArray(value.entries)) {
        if (sourceIsMemo) value.entries.forEach((entry, index) => collectMemoCandidatesFromValue(entry, `${source}.entries[${index}]`, bucket, seen, depth + 1));
      }
      const text = typeof value.text === "string" ? value.text.trim() : "";
      if (sourceIsMemo && text.length >= 8) {
        const key = text.slice(0, 500);
        if (!seen.has(key)) {
          seen.add(key);
          bucket.push({
            source,
            date: value.date || String(value.updatedAt || todayIso()).slice(0, 10),
            title: value.title || "복구된 메모",
            text,
            updatedAt: value.updatedAt || ""
          });
        }
      }
      Object.keys(value).forEach((key) => {
        if (["freeMemo", "entries", "text"].includes(key)) return;
        if (!sourceIsMemo && !key.toLowerCase().includes("memo")) return;
        collectMemoCandidatesFromValue(value[key], `${source}.${key}`, bucket, seen, depth + 1);
      });
    }

    function scanMemoRecoveryCandidates() {
      const candidates = [];
      const seen = new Set();
      const stores = [
        ["localStorage", localStorage],
        ["sessionStorage", sessionStorage]
      ];
      stores.forEach(([storeName, store]) => {
        for (let i = 0; i < store.length; i += 1) {
          const key = store.key(i);
          const raw = store.getItem(key) || "";
          if (!raw.trim()) continue;
          try {
            collectMemoCandidatesFromValue(JSON.parse(raw), `${storeName}.${key}`, candidates, seen);
          } catch {
            if ((key || "").toLowerCase().includes("memo") && raw.trim().length >= 8 && !seen.has(raw.slice(0, 500))) {
              seen.add(raw.slice(0, 500));
              candidates.push({ source: `${storeName}.${key}`, date: todayIso(), title: "복구된 텍스트 메모", text: raw.trim(), updatedAt: "" });
            }
          }
        }
      });
      state.memoRecoveryCandidates = candidates
        .filter((candidate) => String(candidate.text || "").trim())
        .sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")))
        .slice(0, 12);
      localStorage.setItem(storageKey, JSON.stringify(state));
      if (!state.memoRecoveryCandidates.length) {
        alert("현재 이 사이트 주소의 브라우저 저장공간에서는 예전 메모 흔적을 찾지 못했습니다. 온라인 데이터가 이미 빈 메모로 덮였을 수 있어요.");
      }
      renderFreeMemo();
    }

    function restoreMemoCandidate(index) {
      const candidate = (state.memoRecoveryCandidates || [])[index];
      if (!candidate?.text) return;
      snapshotForUndo();
      const date = candidate.date || todayIso();
      const id = makeMemoId(date);
      const entry = {
        id,
        date,
        title: candidate.title || `복구 메모 ${dateLabel(date)}`,
        text: candidate.text,
        updatedAt: new Date().toISOString()
      };
      ensureMemoArchive().entries.push(entry);
      state.freeMemo.activeId = id;
      state.freeMemo.text = entry.text;
      state.freeMemo.updatedAt = entry.updatedAt;
      recordActivity("생각 메모장", "메모 복구", entry.title);
      saveState(false);
    }

    function toggleTodo(index) {
      snapshotForUndo();
      state.todos[index].done = !state.todos[index].done;
      recordActivity("To-do", state.todos[index].title, state.todos[index].done ? "완료" : "미완료");
      saveState(false);
    }

    function ensureNestedTasks(collection, index) {
      state[collection][index].tasks = state[collection][index].tasks || [];
      return state[collection][index].tasks;
    }

    function addNestedTask(collection, index) {
      snapshotForUndo();
      const tasks = ensureNestedTasks(collection, index);
      tasks.push({ text: "새 소항목 미션", done: false });
      recordActivity(collectionName(collection), `${rowName(collection, index)} 소항목 추가`, "새 소항목 미션");
      saveState(false);
    }

    function editNestedTask(collection, index, taskIndex, value) {
      snapshotForUndo();
      const tasks = ensureNestedTasks(collection, index);
      tasks[taskIndex].text = value;
      recordActivity(collectionName(collection), `${rowName(collection, index)} 소항목`, value);
      saveState(false);
    }

    function toggleNestedTask(collection, index, taskIndex) {
      snapshotForUndo();
      const tasks = ensureNestedTasks(collection, index);
      tasks[taskIndex].done = !tasks[taskIndex].done;
      recordActivity(collectionName(collection), `${rowName(collection, index)} · ${tasks[taskIndex].text}`, tasks[taskIndex].done ? "완료" : "미완료");
      saveState(false);
    }

    function deleteNestedTask(collection, index, taskIndex) {
      const tasks = ensureNestedTasks(collection, index);
      if (!tasks[taskIndex]) return;
      snapshotForUndo();
      recordActivity(collectionName(collection), "소항목 삭제", tasks[taskIndex].text);
      tasks.splice(taskIndex, 1);
      saveState(false);
    }

    function addRow(collection) {
      snapshotForUndo();
      const factory = window[`factory_${collection}`];
      state[collection].push(factory ? factory() : {});
      recordActivity(collectionName(collection), "행 추가", "새 항목");
      saveState(false);
    }

    function deleteRow(collection, index) {
      if (!confirm("이 행을 삭제할까요?")) return;
      snapshotForUndo();
      recordActivity(collectionName(collection), "행 삭제", rowName(collection, index));
      state[collection].splice(index, 1);
      saveState(false);
    }

    function selectedIndexes(collection) {
      return Array.from(document.querySelectorAll(`.row-select[data-collection="${collection}"]:checked`))
        .map((el) => Number(el.dataset.index))
        .filter((index) => Number.isInteger(index))
        .sort((a, b) => b - a);
    }

    function deleteSelectedRows(collection) {
      const indexes = selectedIndexes(collection);
      if (!indexes.length) {
        alert("삭제할 항목을 선택해 주세요.");
        return;
      }
      if (!confirm(`${indexes.length}개 항목을 삭제할까요?`)) return;
      snapshotForUndo();
      indexes.forEach((index) => state[collection].splice(index, 1));
      recordActivity(collectionName(collection), "선택삭제", `${indexes.length}개 항목`);
      saveState(false);
    }

    function deleteAllRows(collection) {
      if (!state[collection]?.length) return;
      if (!confirm(`${collectionName(collection)}의 모든 항목을 삭제할까요?`)) return;
      snapshotForUndo();
      const count = state[collection].length;
      state[collection] = [];
      recordActivity(collectionName(collection), "전체삭제", `${count}개 항목`);
      saveState(false);
    }

    function allowDrop(event) {
      event.preventDefault();
    }

    function endDrag(event) {
      event.currentTarget?.classList?.remove("dragging");
      dragState = null;
    }

    function moveArrayItem(array, from, to) {
      if (!array || from === to || from < 0 || to < 0 || from >= array.length || to >= array.length) return null;
      const [item] = array.splice(from, 1);
      array.splice(to, 0, item);
      return item;
    }

    function startRowDrag(event, collection, index) {
      dragState = { type: "row", collection, index };
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    }

    function dropRow(event, collection, targetIndex) {
      event.preventDefault();
      if (!dragState || dragState.type !== "row" || dragState.collection !== collection) return;
      snapshotForUndo();
      const item = moveArrayItem(state[collection], dragState.index, targetIndex);
      if (item) recordActivity(collectionName(collection), "순서 변경", item.name || item.title || item.item || item.topic || "항목");
      dragState = null;
      saveState(false);
    }

    function startTimelineMonthDrag(event, index) {
      dragState = { type: "timelineMonth", index };
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    }

    function dropTimelineMonth(event, targetIndex) {
      event.preventDefault();
      if (!dragState || dragState.type !== "timelineMonth") return;
      snapshotForUndo();
      const item = moveArrayItem(state.timeline, dragState.index, targetIndex);
      if (item) recordActivity("오픈 타임라인", "월 순서 변경", item.title);
      dragState = null;
      saveState(false);
    }

    function startTimelineTaskDrag(event, monthIndex, taskIndex) {
      event.stopPropagation();
      dragState = { type: "timelineTask", monthIndex, taskIndex };
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    }

    function dropTimelineTask(event, monthIndex, targetTaskIndex) {
      event.preventDefault();
      event.stopPropagation();
      if (!dragState || dragState.type !== "timelineTask" || dragState.monthIndex !== monthIndex) return;
      snapshotForUndo();
      const tasks = state.timeline[monthIndex].tasks || [];
      const item = moveArrayItem(tasks, dragState.taskIndex, targetTaskIndex);
      if (item) recordActivity("오픈 타임라인", "세부항목 순서 변경", item.text);
      dragState = null;
      saveState(false);
    }

    function startContractGroupDrag(event, index) {
      dragState = { type: "contractGroup", index };
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    }

    function dropContractGroup(event, targetIndex) {
      event.preventDefault();
      if (!dragState || dragState.type !== "contractGroup") return;
      snapshotForUndo();
      const item = moveArrayItem(state.contractChecklist, dragState.index, targetIndex);
      if (item) recordActivity("계약시 체크리스트", "대항목 순서 변경", item.group);
      dragState = null;
      saveState(false);
    }

    function startContractItemDrag(event, groupIndex, itemIndex) {
      event.stopPropagation();
      dragState = { type: "contractItem", groupIndex, itemIndex };
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    }

    function dropContractItem(event, groupIndex, targetItemIndex) {
      event.preventDefault();
      event.stopPropagation();
      if (!dragState || dragState.type !== "contractItem" || dragState.groupIndex !== groupIndex) return;
      snapshotForUndo();
      const items = state.contractChecklist[groupIndex].items || [];
      const item = moveArrayItem(items, dragState.itemIndex, targetItemIndex);
      if (item) recordActivity("계약시 체크리스트", "체크항목 순서 변경", item.text);
      dragState = null;
      saveState(false);
    }

    function collectionName(collection) {
      return ({
        franchises: "가맹점 DB",
        competitors: "경쟁센터 DB",
        properties: "상가 후보 DB",
        finance: "자금 관리",
        contentIdeas: "블로그·인스타",
        learning: "교육 공부",
        journal: "창업일지",
        todos: "To-do",
        timeline: "오픈 타임라인"
      })[collection] || collection;
    }

    function rowName(collection, index) {
      const row = state[collection]?.[index];
      return row?.name || row?.title || row?.item || row?.topic || row?.month || `${index + 1}행`;
    }

    function editTimeline(index, key, value) {
      snapshotForUndo();
      state.timeline[index][key] = value;
      recordActivity("오픈 타임라인", `${state.timeline[index].month} · ${key}`, value);
      saveState(false);
    }

    function addTimelineMonth() {
      snapshotForUndo();
      state.timeline.push({ month: "", title: "새 월간 목표", due: "", memo: "", tasks: [] });
      recordActivity("오픈 타임라인", "월 추가", "새 월간 목표");
      saveState(false);
    }

    function deleteTimelineMonth(index) {
      if (!confirm("이 월간 타임라인을 삭제할까요?")) return;
      snapshotForUndo();
      recordActivity("오픈 타임라인", "월 삭제", state.timeline[index].title);
      state.timeline.splice(index, 1);
      saveState(false);
    }

    function addTimelineTask(index) {
      snapshotForUndo();
      state.timeline[index].tasks = state.timeline[index].tasks || [];
      state.timeline[index].tasks.push({ text: "새 세부항목", done: false });
      recordActivity("오픈 타임라인", `${state.timeline[index].month} 세부항목 추가`, "새 세부항목");
      saveState(false);
    }

    function editTimelineTask(index, taskIndex, value) {
      snapshotForUndo();
      state.timeline[index].tasks[taskIndex].text = value;
      recordActivity("오픈 타임라인", `${state.timeline[index].month} 세부항목`, value);
      saveState(false);
    }

    function toggleTimelineTask(index, taskIndex) {
      snapshotForUndo();
      const task = state.timeline[index].tasks[taskIndex];
      task.done = !task.done;
      recordActivity("오픈 타임라인", `${state.timeline[index].month} · ${task.text}`, task.done ? "완료" : "미완료");
      saveState(false);
    }

    function deleteTimelineTask(index, taskIndex) {
      snapshotForUndo();
      recordActivity("오픈 타임라인", "세부항목 삭제", state.timeline[index].tasks[taskIndex].text);
      state.timeline[index].tasks.splice(taskIndex, 1);
      saveState(false);
    }

    function editContractGroupMemo(groupIndex, value) {
      snapshotForUndo();
      state.contractChecklist[groupIndex].memo = value;
      recordActivity("계약시 체크리스트", `${state.contractChecklist[groupIndex].group} 메모`, value);
      saveState(false);
    }

    function editContractCheckNote(groupIndex, itemIndex, value) {
      snapshotForUndo();
      const item = state.contractChecklist[groupIndex].items[itemIndex];
      item.note = value;
      recordActivity("계약시 체크리스트", `${state.contractChecklist[groupIndex].group} · ${item.text} 메모`, value);
      saveState(false);
    }

    function toggleContractCheck(groupIndex, itemIndex) {
      snapshotForUndo();
      const item = state.contractChecklist[groupIndex].items[itemIndex];
      item.done = !item.done;
      recordActivity("계약시 체크리스트", `${state.contractChecklist[groupIndex].group} · ${item.text}`, item.done ? "완료" : "미완료");
      saveState(false);
    }

    document.getElementById("saveBtn").addEventListener("click", () => saveState(true));
    document.getElementById("undoBtn").addEventListener("click", undoLast);
    document.getElementById("reloadCloudBtn").addEventListener("click", () => loadCloudState());
    document.getElementById("logoutBtn").addEventListener("click", signOut);
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      try {
        await signIn(email, password);
      } catch (error) {
        setAuthMessage(error.message || "로그인에 실패했습니다.");
      }
    });
    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "project-mont-ceo-os-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    });
    document.getElementById("importFile").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          snapshotForUndo();
          state = mergeDeep(clone(defaults), JSON.parse(reader.result));
          normalizeState();
          saveState(false);
        } catch {
          alert("복원 파일을 읽지 못했습니다.");
        }
      };
      reader.readAsText(file);
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("모든 입력값을 초기 상태로 되돌릴까요?")) return;
      snapshotForUndo();
      state = clone(defaults);
      normalizeState();
      localStorage.removeItem(storageKey);
      saveState(false);
    });

    updateAuthUi();
    render();
    if (authSession) loadCloudState();
  </script>
</body>
</html>
